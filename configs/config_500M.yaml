# CodeForge-500M Architecture Configuration (~505M Exact Parameter Scale Target)
model:
  name: "CodeForge-500M"
  vocab_size: 32000
  hidden_size: 1280
  intermediate_size: 3584  # SwiGLU FFN
  num_hidden_layers: 26    # Exactly ~505M parameters!
  num_attention_heads: 16
  num_key_value_heads: 4   # GQA
  max_position_embeddings: 2048
  rms_norm_eps: 1e-5
  rope_theta: 10000.0
  tie_word_embeddings: false
  use_cache: true
