# CodeForge-1B Architecture Configuration (~990M Exact Parameter Scale Target)
model:
  name: "CodeForge-1B"
  vocab_size: 32000
  hidden_size: 1536
  intermediate_size: 4096  # SwiGLU FFN
  num_hidden_layers: 38    # Exactly ~990M parameters (~1.0B)!
  num_attention_heads: 16
  num_key_value_heads: 4   # GQA
  max_position_embeddings: 2048
  rms_norm_eps: 1e-5
  rope_theta: 10000.0
  tie_word_embeddings: false
  use_cache: true
